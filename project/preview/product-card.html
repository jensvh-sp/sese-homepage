<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--bg-primary);font-family:var(--font-display);font-weight:300;color:var(--fg-primary)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .card{background:#FFFCF5;border:1px solid var(--line-soft);overflow:hidden}
  .img{aspect-ratio:3/4;background:#EFE7DA url('../assets/products/peptide-serum-front.jpg') center/contain no-repeat}
  .img.b{background-image:url('../assets/products/cleansing-foam-front-alt.jpg')}
  .img.c{background-image:url('../assets/products/firming-day-cream-front.jpg')}
  .body{padding:18px}
  .eyebrow{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--fg-muted)}
  .name{font-size:18px;letter-spacing:.02em;margin:6px 0 4px}
  .benefit{font-size:13px;color:var(--fg-secondary);line-height:1.5}
  .price{margin-top:12px;font-size:14px;letter-spacing:.06em}
</style></head>
<body>
  <div class="grid">
    <div class="card"><div class="img"></div><div class="body"><div class="eyebrow">Treat · AM/PM</div><div class="name">Peptide Serum</div><div class="benefit">Firms and improves skin elasticity.</div><div class="price">€42</div></div></div>
    <div class="card"><div class="img b"></div><div class="body"><div class="eyebrow">Cleanse · Step 01</div><div class="name">Cleansing Foam</div><div class="benefit">Gentle gel-to-foam, every skin type.</div><div class="price">€28</div></div></div>
    <div class="card"><div class="img c"></div><div class="body"><div class="eyebrow">Moisturise · AM</div><div class="name">Firming Day Cream</div><div class="benefit">Light, breathable, plumping.</div><div class="price">€38</div></div></div>
  </div>
</body></html>
