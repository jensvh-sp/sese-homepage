<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--bg-primary);font-family:var(--font-display);font-weight:300;color:var(--fg-primary)}
  .lab{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--fg-muted);margin-bottom:14px}
  .eg{display:flex;flex-direction:column;gap:10px;padding:18px 20px;background:var(--sese-warm-white);border:1px solid var(--line-soft);border-radius:4px;margin-bottom:14px}
  .head{font-size:22px;letter-spacing:.02em}
  .body{font-size:14px;color:var(--fg-secondary);line-height:1.55}
  .strike{display:flex;gap:10px}
  .strike s{color:var(--fg-muted)}
  .strike .new{color:var(--fg-primary)}
</style></head>
<body>
  <div class="lab">Voice — do</div>
  <div class="eg">
    <div class="head">Skincare for timeless beauty.</div>
    <div class="body">Five steps. One routine. Five minutes that feel like yours.</div>
  </div>
  <div class="lab">Voice — don't</div>
  <div class="eg">
    <div class="strike"><s class="body">"Banish wrinkles forever! Miracle anti-age formula 💫"</s></div>
    <div class="strike"><span class="new body">→ Honest care for skin that feels like you.</span></div>
  </div>
</body></html>
