<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--bg-primary);font-family:var(--font-display);font-weight:300;color:var(--fg-primary)}
  .row{display:flex;gap:20px;align-items:flex-end}
  .swatch{display:flex;flex-direction:column;align-items:center;gap:10px}
  .chip{width:96px;height:96px;background:var(--sese-sand);border:1px solid var(--line-soft)}
  .lbl{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-muted)}
  .shadow{background:#FAF5EC}
</style></head>
<body>
  <div class="row">
    <div class="swatch"><div class="chip" style="border-radius:2px"></div><div class="lbl">XS · 2</div></div>
    <div class="swatch"><div class="chip" style="border-radius:4px"></div><div class="lbl">SM · 4</div></div>
    <div class="swatch"><div class="chip" style="border-radius:8px"></div><div class="lbl">MD · 8</div></div>
    <div class="swatch"><div class="chip" style="border-radius:16px"></div><div class="lbl">LG · 16</div></div>
    <div class="swatch"><div class="chip" style="border-radius:999px"></div><div class="lbl">Pill</div></div>
    <div class="swatch"><div class="chip shadow" style="border-radius:8px;border:none;box-shadow:0 1px 2px rgba(26,26,26,.04),0 8px 24px rgba(26,26,26,.05)"></div><div class="lbl">Soft</div></div>
    <div class="swatch"><div class="chip shadow" style="border-radius:8px;border:none;box-shadow:0 2px 6px rgba(26,26,26,.06),0 18px 40px rgba(26,26,26,.08)"></div><div class="lbl">Lift</div></div>
  </div>
</body></html>
