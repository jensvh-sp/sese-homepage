<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--bg-primary);font-family:var(--font-display);font-weight:300;color:var(--fg-primary)}
  .row{display:flex;gap:36px;flex-wrap:wrap}
  .item{display:flex;flex-direction:column;gap:8px}
  .lbl{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--fg-muted)}
  .eyebrow{font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--fg-muted)}
  .button{font-size:11px;letter-spacing:.22em;text-transform:uppercase}
  .body{font-size:16px;letter-spacing:.01em;line-height:1.55;color:var(--fg-secondary)}
  .display{font-size:32px;letter-spacing:.02em;line-height:1.05}
</style></head>
<body>
  <div class="row">
    <div class="item"><span class="lbl">Eyebrow · +0.32em</span><span class="eyebrow">Starter routine bundle</span></div>
    <div class="item"><span class="lbl">Button · +0.22em</span><span class="button">Discover the routine</span></div>
    <div class="item"><span class="lbl">Display · +0.02em</span><span class="display">Timeless beauty.</span></div>
    <div class="item"><span class="lbl">Body · +0.01em</span><span class="body">Honest care for skin that feels like you.</span></div>
  </div>
</body></html>
