<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--bg-primary);font-family:var(--font-display);font-weight:300}
  .scale{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--line-soft)}
  .step{flex:1;height:80px;display:flex;align-items:flex-end;padding:8px;font-size:10px;letter-spacing:.1em}
  .label{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--fg-muted);margin:18px 0 8px}
</style></head>
<body>
  <div class="label">Sand</div>
  <div class="scale">
    <div class="step" style="background:#F5EBD6">50</div>
    <div class="step" style="background:#EFDFC2">100</div>
    <div class="step" style="background:#E8D5B0">200</div>
    <div class="step" style="background:#D9BE8E;color:#fff">300</div>
    <div class="step" style="background:#8B7351;color:#fff">700</div>
  </div>
  <div class="label">Sea blue</div>
  <div class="scale">
    <div class="step" style="background:#E6EEF2">50</div>
    <div class="step" style="background:#C5DAEA">100</div>
    <div class="step" style="background:#7AA9BD;color:#fff">300</div>
    <div class="step" style="background:#3A7D94;color:#fff">500</div>
    <div class="step" style="background:#2A5C70;color:#fff">700</div>
  </div>
  <div class="label">Botanical green</div>
  <div class="scale">
    <div class="step" style="background:#E6EDE6">50</div>
    <div class="step" style="background:#C9D7C9">100</div>
    <div class="step" style="background:#88A488;color:#fff">300</div>
    <div class="step" style="background:#4E7A4E;color:#fff">500</div>
    <div class="step" style="background:#355535;color:#fff">700</div>
  </div>
</body></html>
