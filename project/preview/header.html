<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--bg-primary);font-family:var(--font-display);font-weight:300;color:var(--fg-primary)}
  .ann{background:#1A1A1A;color:#FAF5EC;padding:10px 24px;display:flex;align-items:center;justify-content:center;gap:32px;font-size:11px;letter-spacing:.28em;text-transform:uppercase}
  .ann span{opacity:.85}
  .ann .dot{opacity:.4}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:22px 24px;background:var(--bg-primary);border-bottom:1px solid var(--line-soft)}
  .links{display:flex;gap:28px;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--fg-secondary)}
  .wm{font-size:22px;letter-spacing:.32em}
  .right{display:flex;gap:18px;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--fg-secondary)}
</style></head>
<body>
  <div class="ann"><span>Free shipping over €60</span><span class="dot">·</span><span>30-day returns</span><span class="dot">·</span><span>Made in Belgium</span></div>
  <div class="nav">
    <div class="links"><span>Shop</span><span>Routines</span><span>Ingredients</span><span>About</span><span>FAQ</span></div>
    <div class="wm">S E S E</div>
    <div class="right"><span>Search</span><span>Account</span><span>Bag · 0</span></div>
  </div>
</body></html>
