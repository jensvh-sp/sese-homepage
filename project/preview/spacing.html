<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--bg-primary);font-family:var(--font-display);font-weight:300;color:var(--fg-primary)}
  .row{display:flex;gap:14px;align-items:flex-end}
  .box{background:var(--sese-sand);border:1px solid var(--line-soft);display:flex;align-items:center;justify-content:center;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-on-sand)}
  .lbl{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-muted);margin-top:8px;text-align:center}
  .item{display:flex;flex-direction:column;align-items:center}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="width:8px;height:8px"></div><div class="lbl">1 · 4</div></div>
    <div class="item"><div class="box" style="width:16px;height:16px"></div><div class="lbl">2 · 8</div></div>
    <div class="item"><div class="box" style="width:24px;height:24px"></div><div class="lbl">3 · 12</div></div>
    <div class="item"><div class="box" style="width:32px;height:32px"></div><div class="lbl">4 · 16</div></div>
    <div class="item"><div class="box" style="width:48px;height:48px"></div><div class="lbl">5 · 24</div></div>
    <div class="item"><div class="box" style="width:64px;height:64px"></div><div class="lbl">6 · 32</div></div>
    <div class="item"><div class="box" style="width:96px;height:96px"></div><div class="lbl">7 · 48</div></div>
    <div class="item"><div class="box" style="width:128px;height:128px"></div><div class="lbl">8 · 64</div></div>
  </div>
</body></html>
