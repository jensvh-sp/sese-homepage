<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--bg-primary);font-family:var(--font-display);font-weight:300;color:var(--fg-primary);display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start}
  .btn{font-family:var(--font-display);font-weight:300;font-size:12px;letter-spacing:.22em;text-transform:uppercase;padding:16px 26px;border-radius:4px;border:1px solid transparent;cursor:pointer;transition:all .28s cubic-bezier(.22,.61,.36,1);display:inline-flex;align-items:center;gap:10px}
  .primary{background:#1A1A1A;color:#FAF5EC}
  .ghost{background:transparent;color:#1A1A1A;border-color:rgba(26,26,26,.28)}
  .blue{background:#3A7D94;color:#FAF5EC}
  .text{background:transparent;color:#1A1A1A;padding:12px 0;border-bottom:1px solid #1A1A1A;border-radius:0}
</style></head>
<body>
  <button class="btn primary">Shop the routine →</button>
  <button class="btn ghost">View product</button>
  <button class="btn blue">Add to ritual</button>
  <button class="btn text">Read more</button>
</body></html>
