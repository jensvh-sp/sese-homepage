<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px 32px;background:var(--bg-primary);font-family:var(--font-display);font-weight:300;color:var(--fg-primary)}
  .row{display:flex;align-items:baseline;gap:24px;padding:8px 0;border-bottom:1px solid var(--line-soft)}

  .meta{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-muted);min-width:120px}
  .specimen{flex:1}
</style></head>
<body>
  <div class="row"><div class="meta">Display · 88 / 1.05</div><div class="specimen" style="font-size:54px;line-height:1.05">Timeless beauty.</div></div>
  <div class="row"><div class="meta">H1 · 64 / 1.05</div><div class="specimen" style="font-size:42px;line-height:1.05">Skincare for honest care.</div></div>
  <div class="row"><div class="meta">H2 · 36 / 1.2</div><div class="specimen" style="font-size:28px;line-height:1.2">A five-step morning.</div></div>
  <div class="row"><div class="meta">Body · 16 / 1.55</div><div class="specimen" style="font-size:16px;line-height:1.55;color:var(--fg-secondary)">Five steps. One routine. Five minutes that feel like yours.</div></div>
</body></html>
