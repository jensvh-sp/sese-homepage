<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:36px;background:var(--bg-primary);font-family:var(--font-display);font-weight:300;color:var(--fg-primary);display:flex;gap:36px;align-items:center;justify-content:center}
  .wm{display:flex;flex-direction:column;align-items:center;gap:14px}
  .ttl{font-size:34px;letter-spacing:.18em}
  .tag{font-size:11px;letter-spacing:.32em;text-transform:lowercase;color:var(--fg-secondary)}
  .dark{background:#1A1A1A;color:#FAF5EC;padding:34px 40px;border-radius:8px}
  .dark .tag{color:#FAF5EC;opacity:.7}
</style></head>
<body>
  <div class="wm"><div class="ttl">S E S E</div><div class="tag">unlock your skin's timeless beauty</div></div>
  <div class="wm dark"><div class="ttl">S E S E</div><div class="tag">unlock your skin's timeless beauty</div></div>
</body></html>
