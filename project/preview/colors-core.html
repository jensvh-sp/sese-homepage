<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--bg-primary);font-family:var(--font-display);color:var(--fg-primary);font-weight:300}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .swatch{width:148px}
  .chip{height:96px;border-radius:8px;border:1px solid var(--line-soft)}
  .name{font-size:13px;letter-spacing:.18em;text-transform:uppercase;margin-top:10px;color:var(--fg-primary)}
  .hex{font-size:12px;color:var(--fg-muted);letter-spacing:.08em;margin-top:2px}
</style></head>
<body>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#FAF5EC"></div><div class="name">Warm white</div><div class="hex">#FAF5EC</div></div>
    <div class="swatch"><div class="chip" style="background:#E8D5B0"></div><div class="name">Sand</div><div class="hex">#E8D5B0</div></div>
    <div class="swatch"><div class="chip" style="background:#3A7D94"></div><div class="name">Sea Blue</div><div class="hex">#3A7D94</div></div>
    <div class="swatch"><div class="chip" style="background:#4E7A4E"></div><div class="name">Botanical</div><div class="hex">#4E7A4E</div></div>
    <div class="swatch"><div class="chip" style="background:#1A1A1A"></div><div class="name">Ink</div><div class="hex">#1A1A1A</div></div>
  </div>
</body></html>
