<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SESE — Product</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="project/colors_and_type.css" />
  <style>
    :root {
      --bg-page:      #FAF5EC;
      --bg-elev:      #FFFCF5;
      --bg-sand:      #E8D5B0;
      --bg-sand-soft: #F1E6CC;
      --ink:          #1A1A1A;
      --ink-2:        #4A4A47;
      --ink-3:        #7A7770;
      --line-soft:    rgba(26,26,26,0.08);
      --line-default: rgba(26,26,26,0.16);
      --line-strong:  rgba(26,26,26,0.28);
      --blue:         #3A7D94;
      --green:        #4E7A4E;
      --ease-out:     cubic-bezier(0.22,0.61,0.36,1);
      --radius-card:  18px;
    }
    html,body { margin:0; padding:0; background:var(--bg-page); color:var(--ink); font-family:var(--font-display); font-weight:300; -webkit-font-smoothing:antialiased; }
    *,*::before,*::after { box-sizing:border-box; }
    a { color:inherit; text-decoration:none; }
    button { font:inherit; cursor:pointer; }
    img { display:block; max-width:100%; }

    /* announce */
    .announce { background:var(--blue); color:var(--bg-page); text-align:center; padding:11px 0; font-size:11px; letter-spacing:0.28em; text-transform:uppercase; }
    .announce .dot { opacity:0.45; margin:0 16px; }

    /* nav */
    .nav { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; padding:26px 56px; border-bottom:1px solid var(--line-soft); }
    .nav .wordmark { font-size:26px; letter-spacing:0.34em; color:var(--ink); }
    .nav-center { display:inline-flex; gap:36px; font-size:12px; letter-spacing:0.22em; text-transform:uppercase; color:var(--ink-2); }
    .nav-center a { position:relative; padding:6px 0; transition:color .28s var(--ease-out); }
    .nav-center a::after { content:""; position:absolute; left:50%; bottom:-2px; transform:translateX(-50%); width:0; height:1px; background:var(--ink); transition:width .32s var(--ease-out); }
    .nav-center a:hover { color:var(--ink); }
    .nav-center a:hover::after { width:22px; }
    .nav-right { display:flex; justify-content:flex-end; align-items:center; gap:22px; font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:var(--ink-2); }
    .nav-right .icon { width:22px; height:22px; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; }
    .nav-right .icon svg { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:1.25; }
    .cart-btn { display:inline-flex; align-items:center; gap:8px; padding:8px 16px; border:1px solid var(--line-default); border-radius:999px; background:transparent; font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:var(--ink-2); cursor:pointer; }
    .cart-dot { width:6px; height:6px; border-radius:50%; background:var(--blue); display:inline-block; }

    /* crumbs */
    .crumbs { padding:22px 56px 0; display:flex; align-items:center; gap:10px; font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:var(--ink-3); }
    .crumbs .sep { opacity:0.5; }
    .crumbs .cur { color:var(--ink); }

    /* buttons */
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:12px; padding:16px 28px; font-size:11px; letter-spacing:0.24em; text-transform:uppercase; border-radius:999px; border:1px solid transparent; transition:background .32s var(--ease-out),color .32s var(--ease-out),border-color .32s var(--ease-out),transform .15s var(--ease-out); }
    .btn:active { transform:scale(0.985); }
    .btn--dark { background:var(--ink); color:var(--bg-page); border-color:var(--ink); }
    .btn--dark:hover { background:#2A2A2A; }
    .btn--ghost { background:transparent; color:var(--ink); border-color:var(--line-strong); }
    .btn--ghost:hover { border-color:var(--ink); background:rgba(26,26,26,0.03); }

    /* pdp layout */
    .pdp { padding:28px 56px 0; display:grid; grid-template-columns:1.05fr 1fr; gap:56px; }
    .gallery { display:grid; grid-template-columns:96px 1fr; gap:18px; align-items:start; }
    .thumbs { display:flex; flex-direction:column; gap:12px; }
    .thumb { width:96px; height:96px; border-radius:12px; border:1px solid var(--line-soft); cursor:pointer; transition:border-color .28s var(--ease-out); background-position:center; background-repeat:no-repeat; background-size:70%; }
    .thumb.active { border-color:var(--ink); }
    .thumb:hover { border-color:var(--line-strong); }
    .main-img { position:relative; aspect-ratio:4/5; border-radius:20px; overflow:hidden; display:flex; align-items:flex-end; justify-content:center; }
    .main-img img { max-width:78%; max-height:92%; object-fit:contain; filter:drop-shadow(0 22px 30px rgba(26,26,26,0.10)); }
    .corner-tag { position:absolute; top:22px; left:22px; display:inline-flex; align-items:center; gap:10px; padding:8px 14px; background:rgba(255,255,255,0.86); border-radius:999px; font-size:10px; letter-spacing:0.28em; text-transform:uppercase; }
    .corner-tag .dot { width:6px; height:6px; border-radius:50%; background:var(--green); }
    .corner-r { position:absolute; top:22px; right:22px; font-size:10px; letter-spacing:0.28em; text-transform:uppercase; color:var(--ink-2); text-align:right; }
    .zoom-btn { position:absolute; bottom:22px; right:22px; width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.9); display:inline-flex; align-items:center; justify-content:center; box-shadow:0 8px 20px rgba(26,26,26,0.08); border:0; }
    .zoom-btn svg { width:16px; height:16px; stroke:var(--ink); fill:none; stroke-width:1.4; }

    /* buy panel */
    .buy { padding-top:8px; }
    .buy .eyebrow { display:flex; align-items:center; gap:14px; font-size:11px; letter-spacing:0.32em; text-transform:uppercase; color:var(--ink-3); margin-bottom:18px; }
    .buy .eyebrow::before { content:""; width:24px; height:1px; background:var(--ink-3); }
    .buy h1 { margin:0; font-size:60px; line-height:0.98; letter-spacing:0.005em; font-weight:300; }
    .buy .tagline { margin:16px 0 24px; font-size:18px; line-height:1.5; color:var(--ink-2); max-width:480px; font-style:italic; }
    .chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:28px; }
    .chip { padding:7px 12px; border-radius:999px; border:1px solid var(--line-default); font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--ink-2); display:inline-flex; align-items:center; gap:8px; }
    .chip .d { width:5px; height:5px; border-radius:50%; background:var(--green); }
    .reviews { display:flex; align-items:center; gap:12px; margin-bottom:28px; font-size:13px; color:var(--ink-2); }
    .stars { letter-spacing:0.08em; color:var(--blue); font-size:14px; }
    .pricing { display:flex; align-items:baseline; gap:16px; padding:22px 0; border-top:1px solid var(--line-soft); border-bottom:1px solid var(--line-soft); }
    .pricing .now { font-size:32px; }
    .pricing .vol { font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:var(--ink-3); }
    .pricing .stock { margin-left:auto; font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:var(--green); display:inline-flex; align-items:center; gap:8px; }
    .pricing .stock .d { width:6px; height:6px; border-radius:50%; background:var(--green); }
    .buy-row { display:grid; grid-template-columns:130px 1fr; gap:12px; margin:24px 0 12px; }
    .qty { display:inline-flex; align-items:center; justify-content:space-between; padding:0 14px; border-radius:999px; border:1px solid var(--line-default); height:52px; font-size:16px; }
    .qty button { width:28px; height:28px; border-radius:50%; background:transparent; border:0; font-size:16px; color:var(--ink-2); }
    .qty button:hover { color:var(--ink); }
    .qty .v { min-width:24px; text-align:center; }
    .add-cart { height:52px; border-radius:999px; background:var(--ink); color:var(--bg-page); border:0; font-size:11px; letter-spacing:0.28em; text-transform:uppercase; display:inline-flex; align-items:center; justify-content:space-between; padding:0 22px 0 28px; transition:background .28s; }
    .add-cart .right { display:inline-flex; align-items:center; gap:12px; }
    .add-cart:hover { background:#2A2A2A; }
    .add-cart.loading { opacity:0.6; pointer-events:none; }
    .add-cart.added { background:var(--green); }
    .ship-line { display:flex; align-items:center; gap:14px; font-size:12px; color:var(--ink-2); padding:14px 0 0; }
    .ship-line .row { display:inline-flex; align-items:center; gap:8px; }
    .ship-line .ic { width:16px; height:16px; display:inline-flex; align-items:center; justify-content:center; color:var(--blue); }
    .ship-line .ic svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:1.4; }
    .quick-cards { margin-top:28px; display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .quick { border:1px solid var(--line-soft); background:var(--bg-elev); border-radius:14px; padding:16px; display:flex; gap:12px; align-items:flex-start; }
    .quick .qi { width:32px; height:32px; flex:0 0 32px; border-radius:50%; border:1px solid var(--line-default); display:inline-flex; align-items:center; justify-content:center; }
    .quick .qi svg { width:16px; height:16px; stroke:var(--ink); fill:none; stroke-width:1.3; }
    .quick .qt { font-size:13px; color:var(--ink); line-height:1.3; margin-bottom:2px; }
    .quick .qs { font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:var(--ink-3); }

    /* routine strip */
    .routine-strip { margin:96px 56px 0; padding:36px 44px; background:var(--bg-elev); border:1px solid var(--line-soft); border-radius:var(--radius-card); display:grid; grid-template-columns:auto 1fr auto; gap:40px; align-items:center; }
    .routine-strip .heading { max-width:220px; }
    .routine-strip .eb { font-size:11px; letter-spacing:0.32em; text-transform:uppercase; color:var(--ink-3); margin-bottom:8px; }
    .routine-strip .heading h3 { margin:0; font-size:22px; line-height:1.25; font-weight:300; }
    .routine-strip .heading h3 em { font-style:italic; }
    .routine-strip .steps { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; }
    .routine-strip .step { text-align:center; padding:14px 10px; border-radius:12px; background:rgba(26,26,26,0.02); }
    .routine-strip .step.active { box-shadow:0 0 0 1px rgba(26,26,26,0.12) inset; }
    .routine-strip .step .n { font-size:11px; letter-spacing:0.28em; text-transform:uppercase; color:var(--ink-3); margin-bottom:6px; }
    .routine-strip .step.active .n { color:var(--ink); }
    .routine-strip .step .l { font-size:14px; color:var(--ink-2); }
    .routine-strip .step.active .l { color:var(--ink); font-style:italic; }
    .routine-strip .cta a { display:inline-flex; align-items:center; gap:10px; padding:12px 18px; border-radius:999px; border:1px solid var(--line-default); font-size:11px; letter-spacing:0.22em; text-transform:uppercase; transition:background .28s,color .28s,border-color .28s; }
    .routine-strip .cta a:hover { background:var(--ink); color:var(--bg-page); border-color:var(--ink); }

    /* ingredients + how to */
    .section-grid { margin:96px 56px 0; display:grid; grid-template-columns:1fr 1fr; gap:64px; }
    .section-grid .eb { font-size:11px; letter-spacing:0.32em; text-transform:uppercase; color:var(--ink-3); margin-bottom:14px; display:flex; align-items:center; gap:10px; }
    .section-grid .eb::before { content:""; width:22px; height:1px; background:var(--ink-3); }
    .section-grid h2 { margin:0 0 18px; font-size:36px; line-height:1.05; font-weight:300; }
    .section-grid h2 em { font-style:italic; }
    .ingredients-card,.howto { background:var(--bg-elev); border:1px solid var(--line-soft); border-radius:var(--radius-card); padding:28px; }
    .ingredients-list { display:flex; flex-direction:column; }
    .ing { padding:18px 0; border-bottom:1px solid var(--line-soft); display:grid; grid-template-columns:56px 1fr auto; gap:18px; align-items:center; }
    .ing:last-child { border-bottom:0; }
    .swatch { width:56px; height:56px; border-radius:14px; display:inline-flex; align-items:center; justify-content:center; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; }
    .ing .nm { font-size:17px; color:var(--ink); }
    .ing .ds { font-size:13px; color:var(--ink-3); margin-top:2px; }
    .ing .pct { font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:var(--ink-2); }
    .steps2 { display:flex; flex-direction:column; gap:18px; }
    .step2 { display:grid; grid-template-columns:56px 1fr; gap:18px; align-items:flex-start; padding:8px 0; }
    .step2 .num { width:56px; height:56px; border-radius:50%; background:var(--bg-page); border:1px solid var(--line-default); display:inline-flex; align-items:center; justify-content:center; font-size:14px; letter-spacing:0.22em; }
    .step2 .h { font-size:17px; color:var(--ink); margin-bottom:6px; }
    .step2 .p { font-size:14px; color:var(--ink-2); line-height:1.6; }

    /* certs */
    .certs { margin:80px 56px 0; padding:28px 44px; background:var(--bg-sand-soft); border-radius:var(--radius-card); display:grid; grid-template-columns:1fr 1fr 1fr 1fr 1fr; gap:24px; align-items:center; }
    .cert { display:flex; align-items:center; gap:12px; color:#2A2620; }
    .cert .b { width:40px; height:40px; flex:0 0 40px; border-radius:50%; border:1px solid rgba(42,38,32,0.22); display:inline-flex; align-items:center; justify-content:center; }
    .cert .b svg { width:18px; height:18px; stroke:#2A2620; fill:none; stroke-width:1.3; }
    .cert .t { font-size:12px; line-height:1.2; }
    .cert .s { font-size:10px; letter-spacing:0.22em; text-transform:uppercase; color:rgba(42,38,32,0.65); margin-top:2px; }

    /* benefit */
    .benefit { margin:80px 56px 0; display:grid; grid-template-columns:1.05fr 1fr; gap:56px; align-items:stretch; }
    .benefit .visual { aspect-ratio:5/6; border-radius:var(--radius-card); position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; }
    .benefit .visual .pull { position:absolute; left:24px; bottom:24px; right:24px; font-size:28px; line-height:1.18; color:#1A1A1A; font-style:italic; }
    .benefit .visual .credit { position:absolute; left:24px; top:24px; font-size:11px; letter-spacing:0.28em; text-transform:uppercase; color:rgba(26,26,26,0.6); }
    .benefit .copy { display:flex; flex-direction:column; justify-content:center; }
    .benefit .copy h2 { margin:0 0 24px; font-size:44px; line-height:1.04; font-weight:300; }
    .benefit .copy h2 em { font-style:italic; }
    .benefit .copy p { margin:0 0 18px; font-size:17px; line-height:1.65; color:var(--ink-2); max-width:520px; }
    .benefit-stats { margin-top:32px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:28px; border-top:1px solid var(--line-soft); padding-top:24px; }
    .benefit-stats .bs .n { font-size:44px; line-height:1; letter-spacing:0.01em; }
    .benefit-stats .bs .n em { font-style:italic; }
    .benefit-stats .bs .l { font-size:12px; letter-spacing:0.22em; text-transform:uppercase; color:var(--ink-3); margin-top:10px; max-width:180px; line-height:1.4; }

    /* faq */
    .faq-wrap { margin:96px 56px 0; display:grid; grid-template-columns:1fr 1.5fr; gap:72px; align-items:flex-start; }
    .faq-wrap .head .eb { font-size:11px; letter-spacing:0.32em; text-transform:uppercase; color:var(--ink-3); margin-bottom:14px; display:flex; align-items:center; gap:10px; }
    .faq-wrap .head .eb::before { content:""; width:22px; height:1px; background:var(--ink-3); }
    .faq-wrap h2 { margin:0 0 22px; font-size:40px; line-height:1.05; font-weight:300; }
    .faq-wrap h2 em { font-style:italic; }
    .faq-wrap .head p { font-size:14px; line-height:1.65; color:var(--ink-2); max-width:280px; }
    .faq-list { border-top:1px solid var(--line-default); }
    .faq-item { border-bottom:1px solid var(--line-default); }
    .faq-item summary { list-style:none; padding:24px 0; display:flex; align-items:center; justify-content:space-between; cursor:pointer; font-size:20px; line-height:1.3; }
    .faq-item summary::-webkit-details-marker { display:none; }
    .faq-item .ic { width:36px; height:36px; border-radius:50%; border:1px solid var(--line-default); display:inline-flex; align-items:center; justify-content:center; font-size:18px; color:var(--ink-2); transition:transform .32s var(--ease-out),background .32s,color .32s; flex:0 0 36px; margin-left:24px; }
    .faq-item[open] .ic { background:var(--ink); color:var(--bg-page); border-color:var(--ink); transform:rotate(45deg); }
    .faq-item .answer { padding:0 60px 28px 0; font-size:15px; line-height:1.7; color:var(--ink-2); max-width:720px; }

    /* inci */
    .inci { margin:36px 56px 0; border:1px solid var(--line-soft); background:var(--bg-elev); border-radius:var(--radius-card); }
    .inci summary { padding:24px 28px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; list-style:none; font-size:14px; letter-spacing:0.22em; text-transform:uppercase; }
    .inci summary::-webkit-details-marker { display:none; }
    .inci .body { padding:0 28px 28px; font-size:13px; line-height:1.8; color:var(--ink-2); }

    /* pair with */
    .pair-with { margin:96px 56px 0; }
    .pair-with .sec-head { display:flex; align-items:end; justify-content:space-between; gap:24px; margin-bottom:28px; }
    .pair-with .eb { font-size:11px; letter-spacing:0.32em; text-transform:uppercase; color:var(--ink-3); margin-bottom:12px; display:flex; align-items:center; gap:10px; }
    .pair-with .eb::before { content:""; width:22px; height:1px; background:var(--ink-3); }
    .pair-with h3 { margin:0; font-size:36px; line-height:1.06; font-weight:300; }
    .pair-with h3 em { font-style:italic; }
    .pair-with .all { font-size:12px; letter-spacing:0.22em; text-transform:uppercase; border-bottom:1px solid var(--line-default); padding-bottom:3px; }
    .pair-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; }
    .pcard { background:var(--bg-elev); border:1px solid var(--line-soft); border-radius:var(--radius-card); padding:14px 14px 20px; cursor:pointer; transition:transform .42s var(--ease-out),box-shadow .42s var(--ease-out); display:block; }
    .pcard:hover { transform:translateY(-3px); box-shadow:0 22px 40px -22px rgba(26,26,26,0.2); }
    .pcard .pic2 { height:240px; border-radius:10px; background-position:center; background-repeat:no-repeat; background-size:70% auto; }
    .pcard .m { padding:16px 4px 0; }
    .pcard .nm { font-size:17px; }
    .pcard .sb { font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:var(--ink-3); margin-top:4px; }
    .pcard .pr { display:flex; justify-content:space-between; align-items:center; margin-top:14px; }
    .pcard .pr .price { font-size:16px; }
    .pcard .pr .add { font-size:11px; letter-spacing:0.22em; text-transform:uppercase; padding:8px 12px; border-radius:999px; border:1px solid var(--line-default); background:transparent; }

    /* footer */
    .foot-wrap { margin-top:128px; background:var(--bg-sand); color:#2A2620; }
    .foot-top { padding:80px 56px 56px; display:grid; grid-template-columns:1.2fr 1fr 1fr; gap:64px; }
    .foot-col h5 { margin:0 0 22px; font-size:11px; letter-spacing:0.32em; text-transform:uppercase; color:rgba(42,38,32,0.6); font-weight:300; }
    .foot-brand .wm { font-size:30px; letter-spacing:0.34em; margin-bottom:18px; }
    .foot-brand .tag { font-style:italic; font-size:18px; line-height:1.5; max-width:360px; margin-bottom:32px; }
    .foot-brand .contact { font-size:14px; line-height:1.75; }
    .foot-brand .contact a { border-bottom:1px solid rgba(42,38,32,0.25); }
    .foot-col ul { list-style:none; margin:0; padding:0; }
    .foot-col li { padding:6px 0; font-size:15px; }
    .foot-col li a:hover { opacity:0.6; }
    .foot-bot { border-top:1px solid rgba(42,38,32,0.2); padding:24px 56px 32px; display:flex; align-items:center; justify-content:space-between; gap:24px; font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:rgba(42,38,32,0.7); }
    .pay { display:inline-flex; align-items:center; gap:10px; }
    .pay .chip { padding:6px 10px; background:rgba(255,255,255,0.4); border:1px solid rgba(42,38,32,0.18); border-radius:6px; font-size:10px; letter-spacing:0.18em; }

    /* toast */
    #toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:var(--bg-page); padding:14px 28px; border-radius:999px; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; opacity:0; transition:opacity .32s,transform .32s; pointer-events:none; z-index:999; white-space:nowrap; }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* not found */
    .not-found { padding:120px 56px; text-align:center; }
    .not-found h2 { font-size:40px; font-weight:300; margin:0 0 16px; }
    .not-found p { color:var(--ink-2); font-size:16px; margin:0 0 32px; }

    @media(max-width:900px){
      .nav { padding:20px 24px; }
      .nav-center { display:none; }
      .pdp { grid-template-columns:1fr; padding:20px 24px 0; gap:32px; }
      .gallery { grid-template-columns:1fr; }
      .thumbs { flex-direction:row; }
      .thumb { width:68px; height:68px; }

function isConfigured() {
  return !SHOPIFY.domain.includes('YOUR_STORE') && !SHOPIFY.token.includes('YOUR_STOREFRONT');
}

const CART_KEY = 'sese_cart_id';
function endpoint() { return `https://${SHOPIFY.domain}/api/${SHOPIFY.apiVersion}/graphql.json`; }
async function gql(query, variables) {
  const res = await fetch(endpoint(), {
    method:'POST', headers:{'Content-Type':'application/json','X-Shopify-Storefront-Access-Token':SHOPIFY.token},
    body: JSON.stringify({ query, variables }),
  });
  if (!res.ok) throw new Error(`Shopify API ${res.status}`);
  const { data, errors } = await res.json();
  if (errors?.length) throw new Error(errors[0].message);
  return data;
}
const Cart = {
  async addToCart(variantId, qty=1) {
    const cartId = localStorage.getItem(CART_KEY);
    if (cartId) {
      const data = await gql(`mutation cartAdd($id:ID!,$lines:[CartLineInput!]!){cartLinesAdd(cartId:$id,lines:$lines){cart{id checkoutUrl totalQuantity}}}`,{id:cartId,lines:[{merchandiseId:variantId,quantity:qty}]});
      return data.cartLinesAdd.cart;
    } else {
      const data = await gql(`mutation cartCreate($lines:[CartLineInput!]){cartCreate(input:{lines:$lines}){cart{id checkoutUrl totalQuantity}}}`,{lines:[{merchandiseId:variantId,quantity:qty}]});
      const { cart, userErrors } = data.cartCreate;
      if (userErrors?.length) throw new Error(userErrors[0].message);
      localStorage.setItem(CART_KEY, cart.id);
      return cart;
    }
  },
  async getCart() {
    const cartId = localStorage.getItem(CART_KEY);
    if (!cartId) return null;
    const data = await gql(`query{cart(id:"${cartId}"){id checkoutUrl totalQuantity}}`);
    return data.cart;
  },
  async goToCheckout() {
    const cart = await this.getCart();
    if (cart?.checkoutUrl) window.location.href = cart.checkoutUrl;
  },
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3200);
}
function updateCartCount(n) { document.getElementById('cart-count').textContent = n; }

function renderNotFound() {
  document.getElementById('pdp-root').innerHTML = `
    <div class="not-found">
      <h2>Product not found.</h2>
      <p>The product you're looking for doesn't exist or has been moved.</p>
      <a href="index.html" class="btn btn--dark">Back to shop</a>
    </div>`;
}

function bindEvents(key, p) {
  // thumbnail switcher
  document.querySelectorAll('.thumb').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.thumb').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      const src = t.dataset.src;
      const bg  = t.dataset.bg;
      if (src) {
        document.getElementById('main-img').src = src;
        document.getElementById('main-img-wrap').style.backgroundColor = bg;
      }
    });
  });

  // qty
  let qty = 1;
  document.getElementById('qty-minus').addEventListener('click', () => { qty = Math.max(1, qty-1); document.getElementById('qty-val').textContent = qty; });
  document.getElementById('qty-plus').addEventListener('click',  () => { qty++; document.getElementById('qty-val').textContent = qty; });

  // add to cart (main)
  document.getElementById('add-cart-btn').addEventListener('click', async () => {
    const variantId = SHOPIFY.variants[key];
    if (!isConfigured() || variantId.includes('REPLACE_ME')) {
      showToast('Configure Shopify variant IDs to enable checkout.');
      return;
    }
    const btn = document.getElementById('add-cart-btn');
    btn.classList.add('loading');
    try {
      const cart = await Cart.addToCart(variantId, qty);
      updateCartCount(cart.totalQuantity);
      btn.classList.remove('loading');
      btn.classList.add('added');
      btn.querySelector('span').textContent = 'Added ✓';
      showToast('Added to cart.');
      setTimeout(() => { btn.classList.remove('added'); btn.querySelector('span').textContent = 'Add to cart'; }, 2200);
    } catch(err) {
      btn.classList.remove('loading');
      showToast('Could not add to cart. Please try again.');
      console.error(err);
    }
  });

  // cart button in nav
  document.getElementById('cart-btn').addEventListener('click', async () => {
    if (!isConfigured()) { showToast('Configure Shopify to enable checkout.'); return; }
    try { await Cart.goToCheckout(); } catch(e) { showToast('Could not load cart.'); }
  });

  // pair with quick-add buttons
  document.querySelectorAll('.pcard .add').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.preventDefault();
      e.stopPropagation();
      const pid = btn.dataset.product;
      const variantId = SHOPIFY.variants[pid];
      if (!isConfigured() || variantId.includes('REPLACE_ME')) {
        showToast('Configure Shopify to enable checkout.');
        return;
      }
      try {
        const cart = await Cart.addToCart(variantId, 1);
        updateCartCount(cart.totalQuantity);
        showToast(`${PRODUCT_NAMES[pid]} added to cart.`);
      } catch(err) {
        showToast('Could not add to cart.');
      }
    });
  });

  // load cart count
  (async () => {
    if (!isConfigured()) return;
    try { const cart = await Cart.getCart(); if (cart) updateCartCount(cart.totalQuantity); } catch(_) {}
  })();
}

// init
const key = new URLSearchParams(location.search).get('p') || '';
renderPage(key);
</script>
